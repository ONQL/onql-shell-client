name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os_name }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            os_name: linux
            arch: x86_64
            ext: ""
            archive_ext: tar.gz
          - runs_on: windows-latest
            os_name: windows
            arch: x86_64
            ext: ".exe"
            archive_ext: zip
          - runs_on: macos-13
            os_name: macOS
            arch: x86_64
            ext: ""
            archive_ext: tar.gz
          - runs_on: macos-14
            os_name: macOS
            arch: arm64
            ext: ""
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name onql --clean main.py

      - name: Package (Unix)
        if: matrix.os_name != 'windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="onql-shell_${VERSION}_${{ matrix.os_name }}_${{ matrix.arch }}"
          mkdir -p "release/$ARCHIVE"
          cp "dist/onql${{ matrix.ext }}" "release/$ARCHIVE/"
          cp README.md "release/$ARCHIVE/" 2>/dev/null || true
          cd release
          tar czf "$ARCHIVE.tar.gz" "$ARCHIVE"

      - name: Package (Windows)
        if: matrix.os_name == 'windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="onql-shell_${VERSION}_Windows_x86_64"
          mkdir -p "release/$ARCHIVE"
          cp "dist/onql.exe" "release/$ARCHIVE/"
          cp README.md "release/$ARCHIVE/" 2>/dev/null || true
          cd release
          7z a "$ARCHIVE.zip" "$ARCHIVE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: onql-shell-${{ matrix.os_name }}-${{ matrix.arch }}
          path: release/*.${{ matrix.archive_ext }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          cd release
          sha256sum * > checksums.txt
          ls -la

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          name: "ONQL Shell ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## ONQL Shell ${{ github.ref_name }}

            Pre-built single-file binary for each platform. Download, extract, and run.

            ### Quick install

            **Linux / macOS:**
            ```bash
            curl -L https://github.com/ONQL/shell/releases/download/${{ github.ref_name }}/onql-shell_$(echo ${{ github.ref_name }} | sed 's/^v//')_$(uname -s | sed 's/Linux/linux/;s/Darwin/macOS/')_$(uname -m).tar.gz | tar xz
            cd onql-shell_*
            ./onql
            ```

            **Windows:** download the `.zip`, extract, run `onql.exe`.
